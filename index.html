<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MPS 예약프로그램</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 스크롤바 커스텀 */
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
    
    /* 모바일 가로 스크롤바 숨김 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-800 font-sans md:p-8 relative">

  <!-- 글로벌 에러/성공 알림 -->
  <div id="global-message" class="hidden fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-lg z-[60] text-sm font-medium transition-opacity whitespace-nowrap text-white"></div>

  <div class="max-w-6xl mx-auto bg-white md:rounded-2xl shadow-lg overflow-hidden border-x border-b border-gray-100 min-h-screen md:min-h-0">
    
    <!-- 헤더 부분 -->
    <div class="flex flex-col sm:flex-row justify-between items-center p-4 md:p-6 border-b border-gray-100 bg-white">
      <div class="flex items-center gap-3 w-full sm:w-auto mb-4 sm:mb-0 justify-between">
        <div class="flex items-center gap-3">
          <div class="bg-indigo-600 p-2 rounded-lg">
            <i data-lucide="calendar" class="w-5 h-5 md:w-6 md:h-6 text-white"></i>
          </div>
          <h1 class="text-xl md:text-2xl font-bold text-gray-800 tracking-tight">MPS 예약 현황</h1>
        </div>
        
        <!-- 모바일에서만 보이는 관리자 버튼 (작은 화면용) -->
        <button id="admin-toggle-btn-mobile" onclick="toggleAdmin()" class="sm:hidden flex items-center justify-center w-10 h-10 rounded-full transition-colors duration-200 bg-gray-100 text-gray-600">
          <i data-lucide="shield-alert" class="w-5 h-5 admin-icon-mobile"></i>
        </button>
      </div>
      
      <div class="flex items-center gap-4 flex-wrap justify-center w-full sm:w-auto">
        <!-- 상태 표시기 -->
        <div id="cloud-status" class="hidden sm:flex items-center gap-2 text-xs font-semibold text-gray-400">
           <div class="w-2 h-2 rounded-full bg-gray-300 animate-pulse"></div> 연결중...
        </div>
        <!-- PC에서 보이는 관리자 모드 토글 -->
        <button id="admin-toggle-btn" onclick="toggleAdmin()" class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-full text-sm font-semibold transition-colors duration-200 bg-gray-100 text-gray-600 border border-gray-200 hover:bg-gray-200">
          <i data-lucide="shield-alert" class="w-4 h-4 admin-icon"></i>
          <span class="admin-text">관리자 모드 OFF</span>
        </button>
      </div>
    </div>

    <!-- 캘린더 주간 이동 컨트롤 부분 -->
    <div class="flex justify-between items-center p-3 md:p-4 bg-gray-50/50 border-b border-gray-100">
      <button onclick="changeWeek(-7)" class="p-2 md:p-3 rounded-full hover:bg-gray-200 text-gray-600 transition active:scale-95 bg-white shadow-sm border border-gray-100">
        <i data-lucide="chevron-left" class="w-5 h-5 md:w-5 md:h-5"></i>
      </button>
      <div id="month-title" class="text-base md:text-lg font-bold text-gray-700"></div>
      <button onclick="changeWeek(7)" class="p-2 md:p-3 rounded-full hover:bg-gray-200 text-gray-600 transition active:scale-95 bg-white shadow-sm border border-gray-100">
        <i data-lucide="chevron-right" class="w-5 h-5 md:w-5 md:h-5"></i>
      </button>
    </div>

    <!-- ===== PC 버전 UI (가로형 테이블) ===== -->
    <div class="hidden md:block overflow-x-auto">
      <table class="w-full min-w-[800px] border-collapse bg-white">
        <thead>
          <tr id="calendar-head">
            <!-- 자바스크립트로 생성됨 -->
          </tr>
        </thead>
        <tbody id="calendar-body">
          <!-- 자바스크립트로 생성됨 -->
        </tbody>
      </table>
    </div>

    <!-- ===== 모바일 버전 UI (세로형 리스트) ===== -->
    <div class="block md:hidden bg-gray-50 flex-1 h-full">
      <!-- 상단 요일 선택 탭 (가로 스크롤) -->
      <div id="mobile-day-tabs" class="flex overflow-x-auto gap-2 p-3 bg-white border-b border-gray-200 sticky top-0 z-10 hide-scrollbar shadow-sm">
        <!-- 자바스크립트로 생성됨 -->
      </div>
      
      <!-- 선택된 요일의 시간대 리스트 -->
      <div id="mobile-time-slots" class="p-4 space-y-4 pb-24">
        <!-- 자바스크립트로 생성됨 -->
      </div>
    </div>

  </div>

  <!-- 예약 추가 모달 -->
  <div id="add-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden animate-in fade-in zoom-in duration-200">
      <div class="p-5 border-b border-gray-100 flex justify-between items-center">
        <h3 class="text-lg font-bold text-gray-800">예약 추가</h3>
        <button onclick="closeAddModal()" class="text-gray-400 hover:text-gray-600 transition p-2 rounded-full hover:bg-gray-100">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-6">
        <div class="mb-5 text-sm text-gray-600 flex items-center justify-center gap-2 bg-indigo-50/50 border border-indigo-100 p-3 rounded-xl">
          <i data-lucide="calendar" class="w-4 h-4 text-indigo-500"></i>
          <span id="modal-date-text" class="font-medium text-gray-700"></span>
          <span id="modal-time-text" class="font-bold text-indigo-600 bg-white px-2 py-0.5 rounded shadow-sm text-base"></span>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">소속팀</label>
          <input type="text" id="modal-team" placeholder="예: 해온FC, 해온초" class="w-full border border-gray-300 rounded-xl p-3.5 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition mb-4 shadow-sm">
          
          <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">예약자 이름</label>
          <input type="text" id="modal-name" placeholder="이름을 입력하세요" onkeydown="if(event.key==='Enter') saveReservation()" class="w-full border border-gray-300 rounded-xl p-3.5 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm">
        </div>
      </div>
      <div class="p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-2">
        <button onclick="closeAddModal()" class="flex-1 px-4 py-3.5 text-sm font-semibold text-gray-600 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 transition active:scale-95">취소</button>
        <button onclick="saveReservation()" class="flex-1 px-4 py-3.5 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition active:scale-95 shadow-md shadow-indigo-200">저장하기</button>
      </div>
    </div>
  </div>

  <!-- 관리자 비밀번호 인증 모달 -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden">
      <div class="p-5 border-b border-gray-100 flex justify-between items-center">
        <h3 class="text-lg font-bold text-gray-800">관리자 인증</h3>
        <button onclick="closeAdminModal()" class="text-gray-400 hover:text-gray-600 transition p-2 rounded-full hover:bg-gray-100">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-6">
        <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">관리자 아이디</label>
        <input type="text" id="admin-id" placeholder="아이디를 입력하세요" oninput="document.getElementById('admin-error').textContent=''" class="w-full border border-gray-300 rounded-xl p-3.5 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition mb-4 shadow-sm">
        
        <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">관리자 비밀번호</label>
        <input type="password" id="admin-pwd" placeholder="비밀번호를 입력하세요" oninput="document.getElementById('admin-error').textContent=''" onkeydown="if(event.key==='Enter') confirmAdmin()" class="w-full border border-gray-300 rounded-xl p-3.5 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm">
        <p id="admin-error" class="text-red-500 text-xs mt-2 ml-1"></p>
      </div>
      <div class="p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-2">
        <button onclick="closeAdminModal()" class="flex-1 px-4 py-3.5 text-sm font-semibold text-gray-600 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 transition active:scale-95">취소</button>
        <button onclick="confirmAdmin()" class="flex-1 px-4 py-3.5 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition active:scale-95 shadow-md shadow-indigo-200">확인</button>
      </div>
    </div>
  </div>

  <!-- 스크립트 모듈 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 상태 변수
    let currentDate = new Date();
    let isAdmin = false;
    let reservations = {};
    let currentUser = null;
    let selectedSlot = { date: '', time: '' };
    let isCloudConnected = false;
    
    // 모바일 전용 상태 변수
    let selectedDayIndex = 0;

    const TIME_SLOTS = [
      { label: '13:00', value: '13:00' }, { label: '14:00', value: '14:00' },
      { label: '15:00', value: '15:00' }, { label: '16:00', value: '16:00' },
      { label: '17:00', value: '17:00' }, { label: '18:00', value: '18:00' },
      { label: '19:00', value: '19:00' }, { label: '20:00', value: '20:00' }
    ];
    const DAYS_OF_WEEK = ['월', '화', '수', '목', '금', '토', '일'];

    // ==========================================
    // 클라우드 초기화 및 영구 저장소 세팅
    // ==========================================
    let app, auth, db, appId = 'default-app-id';
    
    const initCloud = async () => {
      try {
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        if (!firebaseConfig || Object.keys(firebaseConfig).length === 0) {
          throw new Error("환경 설정 누락");
        }
        
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // 1. 보안 인증 대기 (이 과정이 끝나야 완벽히 저장 가능)
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }

        // 2. 인증 후 실시간 동기화 리스너 등록
        onAuthStateChanged(auth, (user) => {
          currentUser = user;
          if (!user) return;
          
          isCloudConnected = true;
          document.getElementById('cloud-status').innerHTML = `<div class="w-2 h-2 rounded-full bg-green-500"></div> 저장소 연결됨`;

          const reservationsRef = collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
          onSnapshot(reservationsRef, (snapshot) => {
            const newReservations = {};
            snapshot.forEach((doc) => {
              newReservations[doc.id] = doc.data().names || [];
            });
            reservations = newReservations;
            renderCalendar(); // 데이터 갱신 후 즉각 화면 다시 그리기
          }, (error) => {
            console.error("데이터 동기화 실패:", error);
          });
        });
      } catch (error) {
        console.warn("클라우드 초기화 실패, 로컬 임시 모드로 구동됩니다.", error);
        document.getElementById('cloud-status').innerHTML = `<div class="w-2 h-2 rounded-full bg-red-500"></div> 연결 실패`;
      }
    };

    // 유틸: 날짜 처리
    function getStartOfWeek(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.getFullYear(), d.getMonth(), diff);
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getWeekDates() {
      const start = getStartOfWeek(currentDate);
      return Array.from({ length: 7 }).map((_, i) => {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        return d;
      });
    }

    function updateSelectedDayIndex() {
      const todayStr = formatDate(new Date());
      const weekDates = getWeekDates();
      const todayIndex = weekDates.findIndex(d => formatDate(d) === todayStr);
      selectedDayIndex = todayIndex !== -1 ? todayIndex : 0;
    }
    updateSelectedDayIndex();

    function escapeHtml(unsafe) {
      return (unsafe || '').toString()
           .replace(/&/g, "&amp;")
           .replace(/</g, "&lt;")
           .replace(/>/g, "&gt;")
           .replace(/"/g, "&quot;")
           .replace(/'/g, "&#039;");
    }

    // 글로벌 메시지
    function showMessage(msg, isError = false) {
      const el = document.getElementById('global-message');
      el.textContent = msg;
      el.className = `fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-lg z-[60] text-sm font-bold transition-opacity ${isError ? 'bg-red-500 text-white' : 'bg-indigo-600 text-white shadow-indigo-200'} whitespace-nowrap`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3000);
    }

    // 렌더링: 관리자 버튼 업데이트
    function updateAdminBtn() {
      const btnPC = document.getElementById('admin-toggle-btn');
      const btnMobile = document.getElementById('admin-toggle-btn-mobile');
      
      if (isAdmin) {
        btnPC.className = "hidden sm:flex items-center gap-2 px-4 py-2 rounded-full text-sm font-semibold transition-colors duration-200 bg-indigo-100 text-indigo-700 border border-indigo-200 hover:bg-indigo-200";
        btnPC.innerHTML = `<i data-lucide="shield" class="w-4 h-4"></i><span class="admin-text">관리자 모드 ON</span>`;
        btnMobile.className = "sm:hidden flex items-center justify-center w-10 h-10 rounded-full transition-colors duration-200 bg-indigo-100 text-indigo-700 border border-indigo-200";
        btnMobile.innerHTML = `<i data-lucide="shield" class="w-5 h-5"></i>`;
      } else {
        btnPC.className = "hidden sm:flex items-center gap-2 px-4 py-2 rounded-full text-sm font-semibold transition-colors duration-200 bg-gray-100 text-gray-600 border border-gray-200 hover:bg-gray-200";
        btnPC.innerHTML = `<i data-lucide="shield-alert" class="w-4 h-4"></i><span class="admin-text">관리자 모드 OFF</span>`;
        btnMobile.className = "sm:hidden flex items-center justify-center w-10 h-10 rounded-full transition-colors duration-200 bg-gray-100 text-gray-600 border border-gray-200";
        btnMobile.innerHTML = `<i data-lucide="shield-alert" class="w-5 h-5"></i>`;
      }
      if (window.lucide) lucide.createIcons();
    }

    // 렌더링: 통합 캘린더 업데이트
    function renderCalendar() {
      const weekDates = getWeekDates();
      const todayStr = formatDate(new Date());

      // 달력 제목
      const sDate = weekDates[0];
      const eDate = weekDates[6];
      document.getElementById('month-title').textContent = sDate.getMonth() === eDate.getMonth() 
        ? `${sDate.getFullYear()}년 ${sDate.getMonth() + 1}월`
        : `${sDate.getFullYear()}년 ${sDate.getMonth() + 1}월 - ${eDate.getMonth() + 1}월`;

      /* =========================================
         PC 버전 UI 렌더링
         ========================================= */
      let headHtml = `<th class="w-24 p-3 border-b border-r border-gray-200 bg-gray-50 text-gray-500 font-medium text-sm">시간</th>`;
      weekDates.forEach((date, i) => {
        const isToday = formatDate(date) === todayStr;
        const colorClass = i === 5 ? 'text-blue-500' : i === 6 ? 'text-red-500' : 'text-gray-600';
        const bgClass = isToday ? 'bg-indigo-600 text-white' : 'text-gray-800';
        headHtml += `
          <th class="p-3 border-b border-r border-gray-200 bg-gray-50/80 min-w-[120px]">
            <div class="flex flex-col items-center gap-1">
              <span class="text-sm font-semibold ${colorClass}">${DAYS_OF_WEEK[i]}</span>
              <span class="text-lg font-bold w-8 h-8 flex items-center justify-center rounded-full ${bgClass}">${date.getDate()}</span>
            </div>
          </th>`;
      });
      document.getElementById('calendar-head').innerHTML = headHtml;

      let bodyHtml = '';
      TIME_SLOTS.forEach(time => {
        bodyHtml += `<tr class="group hover:bg-indigo-50/30 transition-colors">`;
        bodyHtml += `<td class="p-3 border-b border-r border-gray-200 text-center font-bold text-gray-600 text-sm bg-gray-50/30">${time.label}</td>`;
        
        weekDates.forEach(date => {
          const dateStr = formatDate(date);
          const key = `${dateStr}_${time.value}`;
          const slotRes = reservations[key] || [];
          const isFull = slotRes.length >= 3;

          let cellHtml = `<div class="flex flex-col gap-1.5 h-full min-h-[5rem]">`;
          
          slotRes.forEach((res, idx) => {
            const displayName = typeof res === 'string' ? res : `${res.name} (${res.team})`;
            cellHtml += `
              <div class="flex items-center justify-between bg-indigo-50 text-indigo-800 px-2 py-1.5 rounded text-sm font-medium border border-indigo-100/50">
                <div class="flex items-center gap-1.5 truncate max-w-[90%]">
                  <i data-lucide="user" class="w-3.5 h-3.5 opacity-70 flex-shrink-0"></i>
                  <span class="truncate text-xs font-bold">${escapeHtml(displayName)}</span>
                </div>
                ${isAdmin ? `<button onclick="deleteReservation('${dateStr}', '${time.value}', ${idx})" class="text-indigo-400 hover:text-red-500 p-0.5 rounded transition flex-shrink-0"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>` : ''}
              </div>`;
          });

          if (!isFull && slotRes.length > 0) {
            cellHtml += `<div class="text-xs text-gray-400 text-center mt-1 font-medium">${3 - slotRes.length}자리 남음</div>`;
          }

          if (isAdmin && !isFull) {
            cellHtml += `<button onclick="showAddModal('${dateStr}', '${time.value}')" class="mt-auto flex items-center justify-center gap-1 w-full py-2 border border-dashed border-gray-300 rounded text-gray-500 hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all text-xs font-semibold"><i data-lucide="plus" class="w-3.5 h-3.5"></i> 예약 추가</button>`;
          }

          if (!isAdmin && isFull) {
            cellHtml += `<div class="mt-auto flex items-center justify-center w-full py-1.5 bg-gray-100 rounded text-gray-500 text-xs font-bold border border-gray-200">예약 마감</div>`;
          }

          cellHtml += `</div>`;
          bodyHtml += `<td class="p-2 border-b border-r border-gray-200 align-top relative">${cellHtml}</td>`;
        });
        bodyHtml += `</tr>`;
      });
      document.getElementById('calendar-body').innerHTML = bodyHtml;


      /* =========================================
         모바일 버전 UI 렌더링
         ========================================= */
      let mobileTabsHtml = '';
      weekDates.forEach((date, i) => {
        const isSelected = i === selectedDayIndex;
        const isToday = formatDate(date) === todayStr;
        const colorClass = i === 5 ? 'text-blue-500' : i === 6 ? 'text-red-500' : 'text-gray-500';
        
        mobileTabsHtml += `
          <button onclick="selectMobileDay(${i})" class="flex-shrink-0 w-[4.5rem] py-3 flex flex-col items-center justify-center rounded-2xl border transition-all duration-200 ${isSelected ? 'bg-indigo-600 border-indigo-600 text-white shadow-md transform scale-105' : 'bg-white border-gray-200 text-gray-700 active:scale-95'}">
            <span class="text-xs font-bold mb-1 ${isSelected ? 'text-indigo-100' : colorClass}">${DAYS_OF_WEEK[i]}</span>
            <span class="text-xl font-extrabold ${isToday && !isSelected ? 'text-indigo-600' : ''}">${date.getDate()}</span>
            ${isToday ? `<div class="w-1 h-1 rounded-full mt-1 ${isSelected ? 'bg-white' : 'bg-indigo-600'}"></div>` : '<div class="w-1 h-1 mt-1"></div>'}
          </button>`;
      });
      document.getElementById('mobile-day-tabs').innerHTML = mobileTabsHtml;

      let mobileSlotsHtml = '';
      const activeDate = weekDates[selectedDayIndex];
      const activeDateStr = formatDate(activeDate);

      TIME_SLOTS.forEach(time => {
        const key = `${activeDateStr}_${time.value}`;
        const slotRes = reservations[key] || [];
        const isFull = slotRes.length >= 3;
        
        mobileSlotsHtml += `
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b border-gray-50 bg-gray-50/50">
              <div class="flex items-center gap-2">
                <i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>
                <span class="font-extrabold text-gray-800 text-lg tracking-tight">${time.label}</span>
              </div>
              <span class="text-xs font-bold px-2.5 py-1 rounded-full ${isFull ? 'bg-red-50 text-red-600' : 'bg-indigo-50 text-indigo-600'}">
                ${slotRes.length} / 3 명
              </span>
            </div>
            
            <div class="p-4 bg-white">
              <div class="space-y-2.5">`;

        if(slotRes.length > 0) {
          slotRes.forEach((res, idx) => {
            const displayName = typeof res === 'string' ? res : `${res.name} (${res.team})`;
            mobileSlotsHtml += `
              <div class="flex items-center justify-between bg-indigo-50/50 border border-indigo-100 text-indigo-900 p-3 rounded-xl text-sm font-semibold">
                <div class="flex items-center gap-2.5 truncate">
                  <div class="bg-indigo-100 p-1.5 rounded-md">
                    <i data-lucide="user" class="w-4 h-4 text-indigo-600"></i>
                  </div>
                  <span class="truncate text-[15px]">${escapeHtml(displayName)}</span>
                </div>
                ${isAdmin ? `
                <button onclick="deleteReservation('${activeDateStr}', '${time.value}', ${idx})" class="w-8 h-8 flex items-center justify-center bg-white border border-gray-200 text-gray-400 hover:text-red-500 rounded-lg transition-colors shadow-sm">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>` : ''}
              </div>`;
          });
        } else {
           mobileSlotsHtml += `
              <div class="text-center py-4 text-sm text-gray-400 font-medium bg-gray-50 rounded-xl border border-dashed border-gray-200">
                등록된 예약이 없습니다.
              </div>`;
        }

        if (isAdmin && !isFull) {
          mobileSlotsHtml += `
            <button onclick="showAddModal('${activeDateStr}', '${time.value}')" class="w-full mt-2 py-3.5 border-2 border-dashed border-indigo-200 rounded-xl text-indigo-600 bg-indigo-50/30 hover:bg-indigo-50 transition flex items-center justify-center gap-1.5 text-sm font-bold active:scale-[0.98]">
              <i data-lucide="plus" class="w-4 h-4"></i> 예약 추가하기
            </button>`;
        } else if (!isAdmin && isFull) {
           mobileSlotsHtml += `
            <div class="w-full mt-2 py-3 bg-gray-100 rounded-xl text-gray-500 text-center text-sm font-bold">
              예약 마감
            </div>`;
        }

        mobileSlotsHtml += `
              </div>
            </div>
          </div>`;
      });
      document.getElementById('mobile-time-slots').innerHTML = mobileSlotsHtml;

      if (window.lucide) lucide.createIcons();
    }

    // 모바일 탭 터치
    window.selectMobileDay = (index) => {
      selectedDayIndex = index;
      renderCalendar();
      const tabsContainer = document.getElementById('mobile-day-tabs');
      const targetButton = tabsContainer.children[index];
      if(targetButton) {
        const scrollLeftPos = targetButton.offsetLeft - (tabsContainer.clientWidth / 2) + (targetButton.clientWidth / 2);
        tabsContainer.scrollTo({ left: scrollLeftPos, behavior: 'smooth' });
      }
    };

    // 주간 이동
    window.changeWeek = (days) => {
      currentDate.setDate(currentDate.getDate() + days);
      updateSelectedDayIndex();
      renderCalendar();
      document.getElementById('mobile-day-tabs').scrollTo({left: 0});
    };

    window.toggleAdmin = () => {
      if (isAdmin) {
        isAdmin = false;
        updateAdminBtn();
        renderCalendar();
      } else {
        document.getElementById('admin-id').value = '';
        document.getElementById('admin-pwd').value = '';
        document.getElementById('admin-error').textContent = '';
        document.getElementById('admin-modal').classList.remove('hidden');
        setTimeout(() => document.getElementById('admin-id').focus(), 100);
      }
    };

    window.closeAdminModal = () => {
      document.getElementById('admin-modal').classList.add('hidden');
    };

    window.confirmAdmin = () => {
      const id = document.getElementById('admin-id').value.trim();
      const pwd = document.getElementById('admin-pwd').value;
      if (id === 'mps' && pwd === '1824') {
        isAdmin = true;
        updateAdminBtn();
        renderCalendar();
        closeAdminModal();
        showMessage("관리자 모드가 활성화되었습니다.");
      } else {
        document.getElementById('admin-error').textContent = '아이디 또는 비밀번호가 일치하지 않습니다.';
      }
    };

    window.showAddModal = (date, time) => {
      selectedSlot = { date, time };
      document.getElementById('modal-date-text').textContent = date;
      document.getElementById('modal-time-text').textContent = time;
      document.getElementById('modal-team').value = '';
      document.getElementById('modal-name').value = '';
      document.getElementById('add-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('modal-team').focus(), 100);
    };

    window.closeAddModal = () => {
      document.getElementById('add-modal').classList.add('hidden');
    };

    // ==========================================
    // 영구 데이터 저장 로직
    // ==========================================
    window.saveReservation = async () => {
      const team = document.getElementById('modal-team').value.trim();
      const name = document.getElementById('modal-name').value.trim();
      
      if (!team || !name) return;

      const key = `${selectedSlot.date}_${selectedSlot.time}`;
      const currentList = reservations[key] || [];
      if (currentList.length >= 3) return;

      const updatedList = [...currentList, { name, team }];

      // 화면 즉각 반영
      reservations[key] = updatedList;
      renderCalendar();
      closeAddModal();

      // 클라우드 접속 전이면 경고 알림
      if (!isCloudConnected || !db || !currentUser) {
         showMessage("클라우드 연결 중입니다. 새로고침 시 초기화될 수 있습니다.", true);
         return;
      }

      try {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'reservations', key);
        await setDoc(docRef, { names: updatedList });
        showMessage("예약이 안전하게 저장되었습니다."); // 저장 보장 확인
      } catch (error) {
        console.error("저장 오류:", error);
        showMessage("저장 권한 오류가 발생했습니다.", true);
      }
    };

    window.deleteReservation = async (dateStr, timeStr, index) => {
      const key = `${dateStr}_${timeStr}`;
      const currentList = reservations[key] || [];
      const newList = currentList.filter((_, idx) => idx !== index);
      
      reservations[key] = newList;
      renderCalendar();

      if (!isCloudConnected || !db || !currentUser) return;

      try {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'reservations', key);
        await setDoc(docRef, { names: newList });
        showMessage("예약이 삭제되었습니다.");
      } catch (error) {
        console.error("삭제 오류:", error);
        showMessage("삭제 중 오류가 발생했습니다.", true);
      }
    };

    // 1. 달력을 뼈대부터 즉시 그림 (빠른 화면 표시용)
    renderCalendar();
    
    // 2. 파이어베이스(영구 저장소) 안전하게 연결 시작
    initCloud();

  </script>
</body>
</html>
